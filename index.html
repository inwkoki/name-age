<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>บันทึกข้อมูลสมาชิก</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Kanit', sans-serif;
      background: #0f1117;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
      color: #e2e8f0;
    }

    .wrap {
      width: 100%;
      max-width: 560px;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .icon-wrap {
      width: 56px; height: 56px;
      background: #0d2d1f;
      border: 1px solid #1a5c3a;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      font-size: 26px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 4px;
    }

    .sub {
      font-size: 13px;
      color: #64748b;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .card-title {
      font-size: 11px;
      font-weight: 500;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #64748b;
      margin-bottom: 5px;
    }

    .field input, .field input[type="time"], .field input[type="date"] {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      font-family: 'Kanit', sans-serif;
      font-size: 14px;
      border-radius: 8px;
      border: 1px solid #2a2d3a;
      background: #0f1117;
      color: #e2e8f0;
      transition: border-color 0.15s, background 0.15s;
      outline: none;
    }

    .field input:focus {
      border-color: #3d8b5f;
      background: #12151e;
      box-shadow: 0 0 0 3px rgba(61,139,95,0.12);
    }

    /* datetime inputs color scheme fix */
    input[type="time"]::-webkit-calendar-picker-indicator,
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1) opacity(0.4);
      cursor: pointer;
    }

    .sn-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      margin-bottom: 14px;
    }

    .sn-row .field { flex: 1; }

    .sn-prefix {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: #3d8b5f;
      padding: 0 2px 10px;
      white-space: nowrap;
    }

    .field input.sn-input {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      font-weight: 500;
      color: #4ade80;
      background: #0d1f15;
      border-color: #1a5c3a;
      letter-spacing: 0.05em;
    }

    .field input.sn-input:focus {
      border-color: #3d8b5f;
      box-shadow: 0 0 0 3px rgba(74,222,128,0.08);
    }

    .sn-preview {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #3d8b5f;
      margin-top: 5px;
    }

    .time-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 5px;
    }

    .btn-now {
      font-family: 'Kanit', sans-serif;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 6px;
      border: 1px solid #2a2d3a;
      background: #1a1d27;
      color: #64748b;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-now:hover { border-color: #3d8b5f; color: #4ade80; }

    .btn-submit {
      width: 100%;
      height: 48px;
      background: #166534;
      color: #dcfce7;
      border: 1px solid #1a7a4a;
      border-radius: 8px;
      font-family: 'Kanit', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 1rem;
    }

    .btn-submit:hover { background: #15803d; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { background: #1e2330; color: #475569; border-color: #2a2d3a; cursor: not-allowed; }

    .status {
      text-align: center;
      font-size: 13px;
      padding: 10px;
      border-radius: 8px;
      display: none;
      margin-bottom: 1rem;
    }

    .status.ok      { background: #0d2d1f; color: #4ade80; border: 1px solid #1a5c3a; display: block; }
    .status.err     { background: #2d0d0d; color: #f87171; border: 1px solid #5c1a1a; display: block; }
    .status.loading { background: #1a1d27; color: #64748b; border: 1px solid #2a2d3a; display: block; }

    .records-card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 14px;
      overflow: hidden;
    }

    .records-header {
      padding: 12px 1.25rem;
      border-bottom: 1px solid #2a2d3a;
      font-size: 11px;
      font-weight: 500;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .record-item {
      padding: 10px 1.25rem;
      border-bottom: 1px solid #1e2130;
      display: grid;
      grid-template-columns: 100px 1fr auto;
      gap: 8px;
      align-items: center;
      font-size: 13px;
      animation: fadeIn 0.3s ease;
    }

    .record-item:last-child { border-bottom: none; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .record-sn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      color: #4ade80;
    }

    .record-name { color: #cbd5e1; font-weight: 500; }

    .record-time {
      font-size: 11px;
      color: #475569;
      font-family: 'JetBrains Mono', monospace;
    }

    .empty-msg {
      padding: 2rem;
      text-align: center;
      font-size: 13px;
      color: #334155;
    }

    .divider {
      height: 1px;
      background: #2a2d3a;
      margin: 4px 0 12px;
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="icon-wrap">📋</div>
    <h1>บันทึกข้อมูลสมาชิก</h1>
    <p class="sub">ระบบบันทึกข้อมูลลง Google Sheets</p>
  </div>

  <!-- Form Card -->
  <div class="card">
    <div class="card-title">Serial Number</div>

    <div class="field">
      <label>หมายเลข SN</label>
      <input type="number" id="snNum" class="sn-input" value="1" min="1" max="9999" oninput="updateSnPreview()" />
      <div class="sn-preview" id="snPreview">→ SN-0001</div>
    </div>

    <div class="divider"></div>
    <div class="card-title">ข้อมูลส่วนตัว</div>

    <div class="field-grid">
      <div class="field">
        <label>ชื่อ (Name)</label>
        <input type="text" id="name" placeholder="กรอกชื่อ" />
      </div>
      <div class="field">
        <label>นามสกุล (Surname)</label>
        <input type="text" id="surname" placeholder="กรอกนามสกุล" />
      </div>
      <div class="field">
        <label>อายุ (Age)</label>
        <input type="number" id="age" placeholder="อายุ" min="1" max="120" />
      </div>
    </div>

    <div class="divider" style="margin-top:14px;"></div>
    <div class="card-title">วันที่ และ เวลา</div>

    <div class="time-row">
      <div class="field">
        <label>เวลา (Time)</label>
        <input type="time" id="timeField" />
        <div class="btn-row">
          <button class="btn-now" onclick="setNowTime()">ตอนนี้</button>
        </div>
      </div>
      <div class="field">
        <label>วันที่ (Date)</label>
        <input type="date" id="dateField" />
        <div class="btn-row">
          <button class="btn-now" onclick="setNowDate()">วันนี้</button>
        </div>
      </div>
    </div>
  </div>

  <button class="btn-submit" id="submitBtn" onclick="handleSubmit()">
    <span>📤</span> บันทึกข้อมูล
  </button>

  <div class="status" id="status"></div>

  <!-- Records list -->
  <div class="records-card">
    <div class="records-header">รายการที่บันทึกแล้ว (เซสชันนี้)</div>
    <div id="recordsList">
      <div class="empty-msg">ยังไม่มีข้อมูล</div>
    </div>
  </div>

</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwubTygLJvg0XEhQTDt78YnyvP-AV_GYahsXgqBC0DkcoIIYM5ruovKVNGrZ2p7PzFq5g/exec';
  let records = [];

  function pad(n, w) { return String(n).padStart(w, '0'); }

  function updateSnPreview() {
    const n = parseInt(document.getElementById('snNum').value) || 1;
    document.getElementById('snPreview').textContent = '→ SN-' + pad(n, 4);
  }

  function getSN() {
    const n = parseInt(document.getElementById('snNum').value) || 1;
    return 'SN-' + pad(n, 4);
  }

  function setNowTime() {
    const d = new Date();
    document.getElementById('timeField').value = pad(d.getHours(),2)+':'+pad(d.getMinutes(),2);
  }

  function setNowDate() {
    const d = new Date();
    document.getElementById('dateField').value = d.getFullYear()+'-'+pad(d.getMonth()+1,2)+'-'+pad(d.getDate(),2);
  }

  function getDisplayDate(val) {
    if (!val) return '';
    const [y,m,day] = val.split('-');
    return day+'/'+m+'/'+y;
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + type;
    if (type === 'ok') setTimeout(() => { el.className = 'status'; }, 3000);
  }

  function renderRecords() {
    const el = document.getElementById('recordsList');
    if (records.length === 0) {
      el.innerHTML = '<div class="empty-msg">ยังไม่มีข้อมูล</div>';
      return;
    }
    el.innerHTML = records.slice(-5).reverse().map(r =>
      '<div class="record-item">' +
        '<span class="record-sn">' + r.sn + '</span>' +
        '<span class="record-name">' + r.name + ' ' + r.surname + '</span>' +
        '<span class="record-time">' + r.time + '</span>' +
      '</div>'
    ).join('');
  }

  async function handleSubmit() {
    const sn      = getSN();
    const name    = document.getElementById('name').value.trim();
    const surname = document.getElementById('surname').value.trim();
    const age     = document.getElementById('age').value.trim();
    const timeVal = document.getElementById('timeField').value;
    const dateVal = document.getElementById('dateField').value;
    const time    = timeVal || '';
    const date    = getDisplayDate(dateVal);

    if (!name || !surname || !age) {
      showStatus('⚠️ กรุณากรอกข้อมูลให้ครบ (ชื่อ, นามสกุล, อายุ)', 'err');
      return;
    }
    if (!timeVal || !dateVal) {
      showStatus('⚠️ กรุณาเลือกวันที่และเวลา', 'err');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    showStatus('⏳ กำลังบันทึกข้อมูล...', 'loading');

    const payload = { sn, name, surname, age, time, date };

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      records.push(payload);
      renderRecords();
      showStatus('✅ บันทึก ' + sn + ' สำเร็จ!', 'ok');

      // auto increment SN
      const snEl = document.getElementById('snNum');
      snEl.value = parseInt(snEl.value) + 1;
      updateSnPreview();

      document.getElementById('name').value = '';
      document.getElementById('surname').value = '';
      document.getElementById('age').value = '';
    } catch(e) {
      showStatus('❌ เกิดข้อผิดพลาด: ' + e.message, 'err');
    }

    btn.disabled = false;
  }

  // init
  setNowTime();
  setNowDate();
  updateSnPreview();
</script>
</body>
</html>
